---
# Query focused baseline state in NDFC after initial apply.
# This verification gate exists to reduce "live-change surprise" before PR640 deltas.

- hosts: ndfc
  gather_facts: false
  connection: ansible.netcommon.httpapi

  vars:
    fabric_name: cisco_test_fabric1
    history_line: >-
      History: Cisco Duo 2025-09-09 config change disrupted admin/API traffic;
      verify baseline state before applying high-risk deltas.

  tasks:
    - name: Query VRFs in fabric
      cisco.dcnm.dcnm_vrf:
        fabric: "{{ fabric_name }}"
        state: query
      register: vrf_query

    - name: Query networks in fabric
      cisco.dcnm.dcnm_network:
        fabric: "{{ fabric_name }}"
        state: query
      register: net_query

    - name: Show verification summary
      ansible.builtin.debug:
        msg:
          - "{{ history_line }}"
          - "Fabric: {{ fabric_name }}"
          - "VRF objects found: {{ (vrf_query.response | default([])) | length }}"
          - "Network objects found: {{ (net_query.response | default([])) | length }}"
          - "Expected VRF markers: PROD_VRF_Core, PROD_VRF_Shared, PROD_VRF_WebTier"
          - "Expected network markers: MGMT_OOB_NET3901, PROD_NET_WebServers, PROD_NET_Invalid, PROD_NET_Legacy_VLAN999"
