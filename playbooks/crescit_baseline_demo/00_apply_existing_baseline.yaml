---
# Apply existing baseline configuration in NDFC fabric.
# This is the brownfield "current state" over which PR640 scenarios are evaluated.

- hosts: ndfc
  gather_facts: false
  connection: ansible.netcommon.httpapi

  vars:
    fabric_name: cisco_test_fabric1
    deploy_changes: true
    leaf1: 192.168.10.211
    leaf2: 192.168.10.212

  tasks:
    - name: Ensure baseline VRFs exist (core + scenario seeds)
      cisco.dcnm.dcnm_vrf:
        fabric: "{{ fabric_name }}"
        state: merged
        config:
          - vrf_name: PROD_VRF_Core
            vrf_id: 50010
            vlan_id: 2100
            rd: "65000:10"
            vrf_template: Default_VRF_Universal
            vrf_extension_template: Default_VRF_Extension_Universal
            attach:
              - ip_address: "{{ leaf1 }}"
              - ip_address: "{{ leaf2 }}"

          - vrf_name: PROD_VRF_Shared
            vrf_id: 50020
            vlan_id: 2200
            rd: "65000:20"
            vrf_template: Default_VRF_Universal
            vrf_extension_template: Default_VRF_Extension_Universal
            attach:
              - ip_address: "{{ leaf1 }}"
              - ip_address: "{{ leaf2 }}"

          # Baseline for scenario 02 (PR640 removes explicit RD)
          - vrf_name: PROD_VRF_NewApp
            vrf_id: 50100
            vlan_id: 2300
            rd: "65000:100"
            vrf_template: Default_VRF_Universal
            vrf_extension_template: Default_VRF_Extension_Universal
            attach:
              - ip_address: "{{ leaf1 }}"
              - ip_address: "{{ leaf2 }}"

          # Baseline for scenario 05 (PR640 introduces default-value anti-pattern)
          - vrf_name: PROD_VRF_Defaults
            vrf_id: 50600
            vlan_id: 2600
            rd: "65000:600"
            vrf_template: Default_VRF_Universal
            vrf_extension_template: Default_VRF_Extension_Universal
            attach:
              - ip_address: "{{ leaf1 }}"

          # Baseline for scenario 06 full-stack changes
          - vrf_name: PROD_VRF_WebTier
            vrf_id: 50700
            vlan_id: 2700
            rd: "65000:700"
            vrf_template: Default_VRF_Universal
            vrf_extension_template: Default_VRF_Extension_Universal
            attach:
              - ip_address: "{{ leaf1 }}"
        deploy: "{{ deploy_changes }}"

    - name: Ensure baseline networks exist (core + scenario seeds)
      cisco.dcnm.dcnm_network:
        fabric: "{{ fabric_name }}"
        state: merged
        config:
          - net_name: PROD_NET_CoreServices
            vrf_name: PROD_VRF_Core
            net_id: 30110
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3110
            gw_ip_subnet: "10.111.10.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []
              - ip_address: "{{ leaf2 }}"
                ports: []

          - net_name: PROD_NET_Operations
            vrf_name: PROD_VRF_Core
            net_id: 30111
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3111
            gw_ip_subnet: "10.111.20.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []
              - ip_address: "{{ leaf2 }}"
                ports: []

          - net_name: PROD_NET_SharedServices
            vrf_name: PROD_VRF_Shared
            net_id: 30220
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3220
            gw_ip_subnet: "10.122.20.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []
              - ip_address: "{{ leaf2 }}"
                ports: []

          # Existing VLAN 120 state (represented through network object)
          - net_name: PROD_NET_Core_VLAN120
            vrf_name: PROD_VRF_Core
            net_id: 30120
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 120
            gw_ip_subnet: "10.120.0.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []

          # Existing secure management VLAN range example (3900-3999)
          - net_name: MGMT_OOB_NET3901
            vrf_name: PROD_VRF_Core
            net_id: 33901
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3901
            gw_ip_subnet: "10.39.1.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []

          # Existing legacy VLAN used by removal-risk scenario (VLAN 999)
          - net_name: PROD_NET_Legacy_VLAN999
            vrf_name: PROD_VRF_Shared
            net_id: 30999
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 999
            gw_ip_subnet: "10.199.99.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []

          # Baseline for scenario 04 (PR640 changes VRF reference to non-existent VRF)
          - net_name: PROD_NET_Orphan
            vrf_name: PROD_VRF_Core
            net_id: 30400
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3040
            gw_ip_subnet: "10.104.1.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []

          # Baseline for scenario 06 (PR640 adds DB tier and interface)
          - net_name: PROD_NET_WebServers
            vrf_name: PROD_VRF_WebTier
            net_id: 30700
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3070
            gw_ip_subnet: "10.107.10.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []

          # Baseline for scenario 10 (PR640 changes CIDR to invalid /256)
          - net_name: PROD_NET_Invalid
            vrf_name: PROD_VRF_Core
            net_id: 30100
            net_template: Default_Network_Universal
            net_extension_template: Default_Network_Extension_Universal
            vlan_id: 3010
            gw_ip_subnet: "10.100.1.1/24"
            attach:
              - ip_address: "{{ leaf1 }}"
                ports: []

    - name: Show baseline apply completion
      ansible.builtin.debug:
        msg:
          - "Baseline applied for {{ fabric_name }}"
          - "deploy_changes={{ deploy_changes }}"
          - "Existing state seeded for Crescit PR evaluation"
          - "Scenario-aligned seeds: VRF_NewApp, VRF_Defaults, VRF_WebTier, NET_Orphan, NET_WebServers, NET_Invalid"
