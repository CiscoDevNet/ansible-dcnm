---
# Modify vPC pair configuration in cisco_test_fabric1
#
# This playbook manages the vPC pair between netascode-leaf1 and
# netascode-leaf2 with a full profile specification.
#
# Configuration applied:
#   - LACP active mode port-channels
#   - Allowed VLANs restricted to 100-200,300
#   - Keepalive via management VRF with 5s hold timeout
#   - Port-channel member interfaces on e1/20
#   - Descriptive port-channel labels
#
# deploy is false — changes are staged in NDFC for validation only.
# This is the intended workflow for PR-based validation:
#   stage -> Crescit validates -> approve PR -> deploy separately.

- hosts: ndfc
  gather_facts: false
  connection: ansible.netcommon.httpapi

  vars:
    fabric_name: cisco_test_fabric1
    leaf1_ip: 192.168.10.211
    leaf2_ip: 192.168.10.212
    vpc_domain_id: 1000

  tasks:
    # --------------------------------------------------
    # Step 1: Query current state (before change)
    # --------------------------------------------------
    - name: Query existing vPC pair state
      cisco.dcnm.dcnm_vpc_pair:
        src_fabric: "{{ fabric_name }}"
        state: query
      register: vpc_before

    - name: Show current vPC pair state
      ansible.builtin.debug:
        msg: "Before: {{ vpc_before.response | length }} vPC pair(s) found"

    # --------------------------------------------------
    # Step 2: Merge vPC pair with full profile
    # --------------------------------------------------
    - name: Merge vPC pair with enhanced configuration
      cisco.dcnm.dcnm_vpc_pair:
        src_fabric: "{{ fabric_name }}"
        state: merged
        deploy: false
        config:
          - peerOneId: "{{ leaf1_ip }}"
            peerTwoId: "{{ leaf2_ip }}"
            templateName: "vpc_pair"
            profile:
              ADMIN_STATE: true
              ALLOWED_VLANS: "100-200,300"
              DOMAIN_ID: "{{ vpc_domain_id | int }}"
              FABRIC_NAME: "{{ fabric_name }}"
              KEEP_ALIVE_HOLD_TIMEOUT: 5
              KEEP_ALIVE_VRF: management
              PC_MODE: active
              PEER1_KEEP_ALIVE_LOCAL_IP: "{{ leaf1_ip }}"
              PEER1_MEMBER_INTERFACES: e1/20
              PEER1_PCID: 101
              PEER1_PO_DESC: "vPC-peer1-to-leaf2-crescit"
              PEER2_KEEP_ALIVE_LOCAL_IP: "{{ leaf2_ip }}"
              PEER2_MEMBER_INTERFACES: e1/20
              PEER2_PCID: 102
              PEER2_PO_DESC: "vPC-peer2-to-leaf1-crescit"
      register: merge_result

    - name: Show merge result
      ansible.builtin.debug:
        msg: "Merge complete. Changed={{ merge_result.changed }}"

    # --------------------------------------------------
    # Step 3: Query and display the pair info
    # --------------------------------------------------
    - name: Query vPC pair state after merge
      cisco.dcnm.dcnm_vpc_pair:
        src_fabric: "{{ fabric_name }}"
        state: query
      register: vpc_after

    - name: Display final vPC pair details
      ansible.builtin.debug:
        msg: >-
          After: {{ vpc_after.response | length }} vPC pair(s).
          Peer1={{ vpc_after.response[0].peerOneId | default('N/A') }}
          Peer2={{ vpc_after.response[0].peerTwoId | default('N/A') }}

    # --------------------------------------------------
    # Step 4: Query vPC pair with specific peers
    # --------------------------------------------------
    - name: Query vPC pair by specific peer IPs
      cisco.dcnm.dcnm_vpc_pair:
        src_fabric: "{{ fabric_name }}"
        state: query
        config:
          - peerOneId: "{{ leaf1_ip }}"
            peerTwoId: "{{ leaf2_ip }}"
      register: specific_query

    - name: Display specific vPC pair query result
      ansible.builtin.debug:
        msg: "vPC pair between {{ leaf1_ip }} and {{ leaf2_ip }}: {{ specific_query.response | length }} match(es)"
