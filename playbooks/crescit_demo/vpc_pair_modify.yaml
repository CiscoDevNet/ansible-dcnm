---
# Baseline seed for Crescit demo.
# This represents the currently accepted vPC pair profile in brownfield fabric.

- hosts: ndfc
  gather_facts: false
  connection: ansible.netcommon.httpapi

  vars:
    fabric_name: cisco_test_fabric1
    leaf1_ip: 192.168.10.211
    leaf2_ip: 192.168.10.212
    vpc_domain_id: 1000

  tasks:
    - name: Merge baseline vPC pair profile
      cisco.dcnm.dcnm_vpc_pair:
        src_fabric: "{{ fabric_name }}"
        state: merged
        deploy: false
        config:
          - peerOneId: "{{ leaf1_ip }}"
            peerTwoId: "{{ leaf2_ip }}"
            templateName: "vpc_pair"
            profile:
              ADMIN_STATE: true
              ALLOWED_VLANS: "100-200"
              DOMAIN_ID: "{{ vpc_domain_id | int }}"
              FABRIC_NAME: "{{ fabric_name }}"
              KEEP_ALIVE_HOLD_TIMEOUT: 3
              KEEP_ALIVE_VRF: management
              PC_MODE: active
              PEER1_KEEP_ALIVE_LOCAL_IP: "{{ leaf1_ip }}"
              PEER1_MEMBER_INTERFACES: e1/19
              PEER1_PCID: 101
              PEER1_PO_DESC: "vPC-peer1-baseline"
              PEER2_KEEP_ALIVE_LOCAL_IP: "{{ leaf2_ip }}"
              PEER2_MEMBER_INTERFACES: e1/19
              PEER2_PCID: 102
              PEER2_PO_DESC: "vPC-peer2-baseline"
