################################################################################
# DESCRIPTION - BASIC FABRIC DELETED STATE TEST
# 
# Test basic deletion of fabrics verify results.
# - Deletion of populated fabrics not tested here.
################################################################################
################################################################################
# STEPS
################################################################################
# SETUP
# 1. The following fabrics must be empty on the controller
#    See vars: section in cisco/dcnm/playbooks/dcnm_tests.yaml
#    - fabric_name_00
#    - fabric_type_00  # VXLAN_EVPN
#    - fabric_name_30
#    - fabric_type_30  # ISN
#    - fabric_name_100
#    - fabric_type_100  # VXLAN_EVPN_MSD
#    - fabric_name_10
#    - fabric_type_10  # LAN_CLASSIC
# 2. Delete fabrics under test, if they exist
#    - fabric_name_00
#    - fabric_name_30
#    - fabric_name_100
#    - fabric_name_10
# TEST
# 3. Create fabrics and verify result
#    - fabric_name_00
#    - fabric_name_10
#    - fabric_name_30
#    - fabric_name_100
# 4. Delete fabric_name_00 and fabric_name_100. Verify result
# 5. Delete fabric_name_10 and fabric_name_30. Verify result
# 6. Delete fabric_name_10 and fabric_name_30 again to verify idempotence.
# CLEANUP
# 7. No cleanup required
################################################################################
# REQUIREMENTS
################################################################################
# Inventory:
# ./playbooks/roles/dcnm_fabric/dcnm_hosts.yaml
# Playbook:
# ./playbooks/roles/dcnm_fabric/dcnm_tests.yaml
# Roles:
# ./tests/integration/targets/dcnm_fabric/tests/*.yaml
#
# Example vars:
#
# vars:
#   testcase: dcnm_fabric_deleted_basic
#   fabric_name_00: VXLAN_EVPN
#   fabric_type_00: VXLAN_EVPN
#   fabric_name_10: LAN_CLASSIC
#   fabric_type_10: LAN_CLASSIC
#   fabric_name_30: ISN
#   fabric_type_30: ISN
#   fabric_name_100: MSD
#   fabric_type_100: VXLAN_EVPN_MSD
################################################################################
# SETUP
################################################################################
- name: DELETED - SETUP - Delete fabrics
  cisco.dcnm.dcnm_fabric:
    state: deleted
    config:
      - FABRIC_NAME: "{{ fabric_name_00 }}"
      - FABRIC_NAME: "{{ fabric_name_100 }}"
      - FABRIC_NAME: "{{ fabric_name_10 }}"
      - FABRIC_NAME: "{{ fabric_name_30 }}"
  register: result
- debug:
    var: result
