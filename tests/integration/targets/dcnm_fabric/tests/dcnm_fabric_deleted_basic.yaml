  register: result
- debug:
    var: result
- set_fact:
    TEST_PHRASE: "is deleted successfully"
- assert:
    that:
      - result.changed == true
      - result.failed == false
      - (result.diff | length) == 2
      - result.diff[0].FABRIC_NAME == fabric_name_00
